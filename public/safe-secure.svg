<svg viewBox="0 0 800 600" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Clip path for a playful wavy/rounded card shape -->
    <clipPath id="playful-clip">
      <rect x="10" y="10" width="780" height="580" rx="30" ry="30" />
    </clipPath>
  </defs>

  <!-- Embed the photo -->
  <image href="/safe-secure.jpg" width="800" height="600" preserveAspectRatio="xMidYMid slice" clip-path="url(#playful-clip)" />

  <!-- Playful hand-drawn overlay border or decorative doodles in corners -->
  <!-- Corner stars/circles matching the kid theme -->
  <circle cx="40" cy="40" r="12" fill="#FD7201" opacity="0.8" />
  <circle cx="760" cy="40" r="8" fill="#031D95" opacity="0.8" />
  <circle cx="760" cy="560" r="15" fill="#10B981" opacity="0.7" />
  <circle cx="40" cy="560" r="10" fill="#8B5CF6" opacity="0.8" />

  <!-- Doodled border outline -->
  <rect x="10" y="10" width="780" height="580" rx="30" ry="30" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-dasharray="8 6" opacity="0.9" />
</svg>
